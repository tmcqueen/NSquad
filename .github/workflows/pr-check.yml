name: PR Check

on:
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Format / Build / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NSquad.slnx

      - name: Format check
        run: dotnet format NSquad.slnx --verify-no-changes

      - name: Build
        run: dotnet build NSquad.slnx --no-restore --configuration Release

      - name: Test (SDK)
        run: dotnet run --project tests/Squad.Sdk.Tests --configuration Release --no-build

      - name: Test (CLI)
        run: dotnet run --project tests/Squad.Cli.Tests --configuration Release --no-build
